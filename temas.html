<script>
function toggleMenu() {
document.getElementById('mobile-menu').classList.toggle('hidden');
}

const colors = { beginner: 'beginner', intermediate: 'intermediate', advanced: 'advanced' };
const icons = { beginner: 'fa-seedling', intermediate: 'fa-code', advanced: 'fa-rocket' };

function filterTopics(level) {
const container = document.getElementById('topics-grid');
const topics = level === 'all' ? data.topics : data.topics.filter(t => t.level === level);

container.innerHTML = topics.map(topic => `
<a href="sintaxis.html?topic=${topic.title.toLowerCase()}" class="glass-card p-6 rounded-xl border-l-4 border-l-${colors[topic.level]} hover:scale-[1.02] block">
<div class="flex items-center gap-4 mb-4">
<div class="w-10 h-10 rounded-lg bg-${colors[topic.level]}/20 flex items-center justify-center text-${colors[topic.level]}">
<i class="fas ${topic.icon}"></i>
</div>
<h3 class="text-lg text-${colors[topic.level]}" style="font-family: 'Bangers', cursive;">${topic.title}</h3>
</div>
<p class="text-on-surface-variant text-sm mb-3">${topic.description}</p>
<div class="flex flex-wrap gap-2">
${topic.tags.slice(0, 3).map(tag => `<span class="px-2 py-1 rounded bg-surface-container-high text-[10px]">${tag}</span>`).join('')}
</div>
</a>
`).join('');
}

filterTopics('all');

// Check URL params
const params = new URLSearchParams(window.location.search);
const level = params.get('level');
if (level) filterTopics(level);
</script>
