<script src="data.js"></script>
<script>
function toggleMenu() {
document.getElementById('mobile-menu').classList.toggle('hidden');
}

function filterExercises(level) {
const container = document.getElementById('exercises-grid');
const exercises = level === 'all' ? data.exercises : data.exercises.filter(e => e.difficulty === level);

container.innerHTML = exercises.map(ex => `
<div class="glass-card p-6 rounded-xl border-l-4 border-l-${ex.difficulty === 'beginner' ? 'beginner' : ex.difficulty === 'intermediate' ? 'intermediate' : 'advanced'}">
<div class="flex justify-between items-start mb-3">
<span class="text-lg text-${ex.difficulty === 'beginner' ? 'beginner' : ex.difficulty === 'intermediate' ? 'intermediate' : 'advanced'}" style="font-family: 'Bangers', cursive;">Nivel ${ex.level}</span>
<span class="px-2 py-1 rounded bg-${ex.difficulty === 'beginner' ? 'beginner' : ex.difficulty === 'intermediate' ? 'intermediate' : 'advanced'}/20 text-xs">${ex.difficulty}</span>
</div>
<h4 class="text-lg text-on-surface mb-2" style="font-family: 'Bangers', cursive;">${ex.title}</h4>
<p class="text-on-surface-variant text-sm mb-4">${ex.description}</p>
<div class="flex flex-wrap gap-2">
${ex.tags.slice(0, 3).map(tag => `<span class="px-2 py-1 rounded bg-surface-container-high text-[10px]">${tag}</span>`).join('')}
</div>
</div>
`).join('');
}

filterExercises('all');
</script>
