<script>
let activeTab = 'variables';

function toggleMenu() {
document.getElementById('mobile-menu').classList.toggle('hidden');
}

function renderTabs() {
const container = document.getElementById('sintaxis-tabs');
const tabs = data.tabs.slice(0, 12);

container.innerHTML = tabs.map(tab => `
<button onclick="showTab('${tab}')" class="px-4 py-2 rounded-full border ${activeTab === tab ? 'bg-primary-container text-on-primary-container' : 'border-outline-variant text-on-surface-variant hover:border-primary'} text-sm">
${tab.charAt(0).toUpperCase() + tab.slice(1)}
</button>
`).join('');
}

function showTab(tabName) {
activeTab = tabName;
renderTabs();
renderCodeExamples();
}

function escapeHtml(code) {
return code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function renderCodeExamples() {
const container = document.getElementById('code-examples-grid');
const examples = data.codeExamples[activeTab] || [];

if (examples.length === 0) {
container.innerHTML = '<p class="text-on-surface-variant">Selecciona una pestaña para ver ejemplos</p>';
return;
}

container.innerHTML = examples.map(ex => `
<div class="glass-card rounded-xl overflow-hidden">
<div class="bg-surface-container-high px-4 py-2 flex items-center justify-between border-b border-outline-variant">
<div class="flex gap-2">
<div class="w-3 h-3 rounded-full bg-[#ff5f56]"></div>
<div class="w-3 h-3 rounded-full bg-[#ffbd2e]"></div>
<div class="w-3 h-3 rounded-full bg-[#27c93f]"></div>
</div>
<div class="text-on-surface-variant text-sm">${ex.title}</div>
</div>
<pre class="p-4 overflow-x-auto"><code class="language-python">${escapeHtml(ex.code)}</code></pre>
</div>
`).join('');

Prism.highlightAll();
}

renderTabs();
renderCodeExamples();

// Check URL params
const params = new URLSearchParams(window.location.search);
const topic = params.get('topic');
if (topic && data.codeExamples[topic]) {
activeTab = topic;
renderTabs();
renderCodeExamples();
}
</script>
